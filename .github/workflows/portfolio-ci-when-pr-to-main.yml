name: Portfolio - CI when PR to main (Check)

on:
  # Runs on pushes targeting the default branch
  pull_request:
    branches:
      - "main"
    paths:
      - "portfolio/**"
      - ".github/workflows/portfolio-ci-when-pr-to-main.yml"

defaults:
  run:
    working-directory: portfolio

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Build job
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
